    - "Spec amendments (Phase 2) are explicit, documented, and traceable to disposition D3 (NFR-7 PUBLISH_FAILED) and D4 (§2.1 + §17 src/ironops/ package location)."
    - "Guard Boundary Table (§9) rows are exercised across test_manifest, test_sources, test_render, test_metadata, test_negative."

  partial_coverage_gaps:
    - id: NFR-2
      gap: "Wall-clock budget (<60s soft, 300s hard) — pipeline.py has timing instrumentation per Step 3.9 but no test asserts the threshold. Risk: NFR-2 regression undetectable in CI."
    - id: NFR-5
      gap: "No test explicitly asserts the builder never `exec`s upstream-supplied shell scripts. Implicit via copy-only semantics but unstated."
    - id: NFR-8
      gap: "Cross-version schema compat untestable now (no v0.2 exists). Tracked via CHANGELOG discipline only — acceptable for v0.1 but should evolve in v0.x."
    - id: AC-7
      gap: "End-to-end install-and-invoke flow is documented (MARKETPLACE_BOOTSTRAP.md, README.md) but NOT automated. Spec §12 explicitly notes 'Manual smoke test' — this is an authorized deviation, not a drift."
    - id: AC-9
      gap: "No aggregated Guard Boundary Table coverage matrix. Individual guards are tested but Step 6.6 (test_inventory.md) covers FR/NFR/AC, not the §9 guard rows. Risk: AC-9 'Coverage report in build artifacts' verification clause unsatisfied."
    - id: manifest.marketplace.name
      gap: "No 'must not match Anthropic-reserved name' check in manifest.py. Implementation surface (Step 3.3) does not enumerate reserved names."

  authorized_deviations:
    - "Step 3.9 pipeline.py: manifest parsed at START of Stage 1 (not Stage 2 per spec §7 ordering). Documented inline — spec §7 lists CLONE before READ MANIFEST but clone needs manifest.sources to iterate. Stage 2 becomes a no-op re-validation pass. Documented as spec-traceability, not a violation."
    - "Step 3.4 sources.py: uses `git ls-remote --symref <url> HEAD` rather than `git remote show origin`. Documented inline — ls-remote works from URL alone (no clone required). FR-2-A3 allows 'git remote show or equivalent'."
    - "Step 7.3 manifest.yaml: spec §13 says '~8 skills' but tasklist lists 10. Additions (sc-cleanup-audit-protocol, sc-task-protocol) are mandated by FR-4 co-import enforcement — the cleanup-audit and task commands reference these protocols. Without them, FR-4 would reject the build."

  potential_drift:
    - "AC-9 verification clause 'Coverage report in build artifacts' has no implementing task item. Test inventory (Step 6.6) covers FR/NFR/AC but not the §9 guard rows aggregated. Measurable gap not addressed by current task design."
    - "NFR-2 wall-clock budget assertion absent from any test. Pipeline timing instrumentation exists but no assertion enforces NFR-2's 60s soft / 300s hard ceilings."

